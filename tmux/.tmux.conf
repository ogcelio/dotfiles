# ==========================================
# Terminal prefix (CELIO)
# ==========================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ==========================================
# PERFORMANCE & OPTIMIZATION (Vim-Ready)
# ==========================================
# Remove o delay do ESC (essencial para Neovim/Zed não travarem ao sair do modo Insert)
set -s escape-time 0

# Terminal & colors
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:Tc"
set -g allow-passthrough on

# Enable activity alerts
set -g monitor-activity on
set -g visual-bell off

# Increase history
set-option -g history-limit 30000

# ==========================================
# NAVEGAÇÃO ESTILO VIM (hjkl)
# ==========================================
# Set vim keys para o modo de comando/cópia
set-option -g mode-keys vi

# Mover entre painéis como no Neovim (hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar painéis (HJKL) - o '-r' permite repetir sem apertar o prefixo de novo
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ==========================================
# JANELAS E PAINÉIS
# ==========================================
set -g renumber-windows on 
set -g base-index 1
set -g pane-base-index 1

# Divisão de painéis mantendo o path atual (estilo Neovim/IDE)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ==========================================
# TÍTULO E INTERFACE
# ==========================================
set -g set-titles on
set -g set-titles-string '\
{#H} #S:#W #{session_alerts}\
#(ps ax -o comm= -p "#{client_pid}" 2>/dev/null | \
grep -q sshd && printf " [SSH] ") \
#{?client_prefix,✼, }'

setw -g allow-rename off
setw -g automatic-rename off

# ==========================================
# CLIPBOARD & COPY MODE (OSC 52 + Vim)
# ==========================================
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection

# Integração com o seu comando OSC 52 existente, mas otimizado para o gesto 'y'
if-shell 'uname -s | grep -q Linux' {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel \
    "tmux save-buffer - | base64 | tr -d '\n' | printf '\033]52;c;%s\007' \"$(cat)\""
}

# ==========================================
# SCRIPTS E POPUPS (Sua lógica original)
# ==========================================
bind r run-shell -b '\
  tmux source-file ~/.tmux.conf ; \
  tmux display-message "Config reloaded 🌀..."; \
'

bind C-l run-shell '${HOME}/dotfiles/tmux/scripts/fzf.sh'

bind-key C-n display-popup -E -w 60% -h 60% "${HOME}/dotfiles/tmux/scripts/make_note.sh"
bind-key C-p display-popup -E -w 60% -h 60% "python"
bind-key C-h display-popup -E -w 80% -h 80% "htop"
bind-key C-t display-popup -E -w 80% -h 80% ""
bind-key C-x display-popup -w 80% -h 80% "just run"

bind-key -r C-w run-shell '${HOME}/dotfiles/tmux/scripts/popup.sh float_popup term'

# ==========================================
# THEME (Sua identidade visual Verde/Preto)
# ==========================================
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-right-length 100
set -g status-right "#{?client_prefix,#[fg=black bg=green]#[fg=green bold \
bg=black] #S #D ,#[fg=black bg=green]#[fg=white dim bg=black] #S #D }"

set -g message-style "fg=green,bg=black"
set -g status "on"
set -g status-justify "left"

setw -g window-status-style "NONE,fg=black,bg=green"
setw -g window-status-format "#[fg=green,bg=green]#[default] #I:#W #F \
#[fg=green,bg=green]#[default]"
setw -g window-status-current-format "#[fg=green,bg=black]#[fg=white,\
bg=black] #I:#W #F #[fg=black,bg=green]#[default]"

set -g status-style "fg=black,bg=green"

set -g status-left-length 100
set -g status-left '#[fg=green,bg=black]#(ps ax -o comm= -p "#{client_pid}" 2>/dev/null | \
grep -q sshd && printf " [SSH]")\
#{?client_prefix, [#h] ✼ ,#[fg=white dim bg=black] [#h] - \
#[default]}#[fg=black,bg=green]#[default]'

# ==========================================
# TPM (Plugin Manager)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

run '${HOME}/.tmux/plugins/tpm/tpm'
